<div class="global-progress-bar" *ngIf="loadingService.loading$ | async">
  <div class="progress-fill"></div>
</div>

<nav class="navbar-modern">
  <div class="container-fluid d-flex align-items-center h-100 px-4">
    
    <div class="brand d-flex align-items-center gap-2 me-5" style="cursor: pointer" routerLink="/">
      <div class="brand-icon" style="filter: drop-shadow(0 0 5px rgba(129, 140, 248, 0.4));">✨</div>
      <h4 class="mb-0 fw-bold tracking-wide" style="color: var(--nav-brand); letter-spacing: -0.01em;">Finance<span style="opacity: 0.7; font-weight: 500;">Manager</span></h4>
    </div>

    <!-- Links de Navegação -->
    <div class="nav-links d-flex gap-4">
      <ul class="navbar-nav d-flex flex-row">
          <li class="nav-item ms-2">
            <a class="nav-link rounded-pill px-3 py-2 d-flex align-items-center gap-2" routerLink="/controle" routerLinkActive="active">
              <span class="normal-emoji icon-nav">💸</span> Transações
            </a>
          </li>
          <li class="nav-item ms-2">
            <a class="nav-link rounded-pill px-3 py-2 d-flex align-items-center gap-2" routerLink="/dashboard" routerLinkActive="active">
              <span class="normal-emoji icon-nav">📊</span> Dashboard
            </a>
          </li>
          <li class="nav-item ms-2">
            <a class="nav-link rounded-pill px-3 py-2 d-flex align-items-center gap-2" routerLink="/configuracoes" routerLinkActive="active">
              <span class="normal-emoji icon-nav">⚙️</span> Configurações
            </a>
          </li>
        </ul>
    </div>

    <!-- Theme Toggle Toggle (Right Side) -->
    <div class="ms-auto">
      <button class="btn rounded-circle border-0 d-flex align-items-center justify-content-center p-2" 
              style="background: var(--glass-bg); backdrop-filter: blur(10px); transition: transform 0.2s;"
              onmouseover="this.style.transform='scale(1.1)'"
              onmouseout="this.style.transform='scale(1)'"
              (click)="themeService.toggleTheme()" 
              title="Alternar Tema">
        <ng-container *ngIf="themeService.isDarkMode; else lightIcon">
          <span class="fs-5" style="line-height: 1;">🌞</span>
        </ng-container>
        <ng-template #lightIcon>
          <span class="fs-5" style="line-height: 1;">🌙</span>
        </ng-template>
      </button>
    </div>

  </div>
</nav>

<main>
  <router-outlet></router-outlet>
</main>
